version: "3.8"

services:
  db:
    image: postgis/postgis:18-master
    restart: unless-stopped
    container_name: "postgis"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=Reitti
    volumes:
      - postgis:/var/lib/postgresql

volumes:
  postgis: