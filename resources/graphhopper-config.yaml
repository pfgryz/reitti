graphhopper:
  datareader.file: "/data/hsl.osm.pbf"
  graph.location: /data/graph-cache

  profiles:
   - name: foot
     custom_model_files: [foot.json, foot_elevation.json]
 
  profiles_ch:
    - profile: foot

  profiles_lm: []

  graph.encoded_values: >
    country, road_class, roundabout, max_speed,
    foot_access, foot_average_speed, foot_priority, foot_road_access, hike_rating, average_slope, mtb_rating

  graph.elevation.provider: srtm

  prepare.min_network_size: 200
  prepare.subnetworks.threads: 8

  routing.snap_preventions_default: tunnel, bridge, ferry

  routing.non_ch.max_waypoint_distance: 1000000

  import.osm.ignored_highways: ''
  graph.dataaccess.default_type: RAM_STORE

server:
  application_connectors:
  - type: http
    port: 8989
    bind_host: 0.0.0.0
    max_request_header_size: 50k
  request_log:
      appenders: []
  admin_connectors:
  - type: http
    port: 8990
    bind_host: 0.0.0.0

logging:
  appenders:
    - type: file
      time_zone: UTC
      current_log_filename: logs/graphhopper.log
      log_format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
      archive: true
      archived_log_filename_pattern: ./logs/graphhopper-%d.log.gz
      archived_file_count: 30
      never_block: true
    - type: console
      time_zone: UTC
      log_format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  loggers:
    "com.graphhopper.osm_warnings":
      level: DEBUG
      additive: false
      appenders:
        - type: file
          currentLogFilename: logs/osm_warnings.log
          archive: false
          logFormat: '[%level] %msg%n'